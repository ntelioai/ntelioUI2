<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntelioUI2 Tests</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #333; }
        .instructions {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .instructions code {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 3px;
        }
        #results {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        #results.pass { background: #d4edda; color: #155724; }
        #results.fail { background: #f8d7da; color: #721c24; }
    </style>

    <!-- jQuery MUST be loaded before ES modules -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h1>ntelioUI2 Test Suite</h1>

    <div class="instructions">
        <p>Open the <strong>browser console</strong> to see test output.</p>
        <p>Run <code>TestRunner.summary()</code> in console for final results.</p>
    </div>

    <div id="results"></div>

    <script type="module">
        import { TestRunner } from './runner/TestRunner.js'

        // Import all test files
        import './core/Widget.test.js'
        // import './core/ResourceLoader.test.js'
        // import './core/EventBus.test.js'

        // Show summary
        window.TestRunner = TestRunner

        setTimeout(() => {
            const passed = TestRunner.summary()
            const resultsDiv = document.getElementById('results')
            resultsDiv.className = passed ? 'pass' : 'fail'
            resultsDiv.innerHTML = passed
                ? `<strong>All tests passed!</strong> (${TestRunner.results.passed} tests)`
                : `<strong>Some tests failed.</strong> ${TestRunner.results.passed} passed, ${TestRunner.results.failed} failed. See console for details.`
        }, 100)
    </script>
</body>
</html>
