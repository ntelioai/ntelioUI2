<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourceAssignmentBoard - ntelioUI2</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../../../../css/ntelioUI.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        .top-bar {
            flex-shrink: 0;
            padding: 10px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        .top-bar h5 { margin: 0 0 6px 0; }
        .board-container {
            flex: 1 1 auto;
            overflow: hidden;
            padding: 12px;
        }
        .event-log {
            flex-shrink: 0;
            height: 140px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            padding: 10px 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h5>SourceAssignmentBoard Demo</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary" id="btn-assignments">
                <i class="fas fa-list"></i> Log Assignments
            </button>
            <button class="btn btn-sm btn-outline-secondary" id="btn-expand">
                <i class="fas fa-expand"></i> Expand All
            </button>
            <button class="btn btn-sm btn-outline-secondary" id="btn-collapse">
                <i class="fas fa-compress"></i> Collapse All
            </button>
            <button class="btn btn-sm btn-outline-danger" id="btn-clear-log">
                <i class="fas fa-trash"></i> Clear Log
            </button>
        </div>
    </div>

    <div class="board-container" id="demo-board"></div>

    <div class="event-log" id="event-log">Waiting for events...</div>

    <script type="module" src="./main.js"></script>
</body>
</html>
