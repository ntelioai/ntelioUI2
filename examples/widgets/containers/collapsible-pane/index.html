<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollapsiblePane - ntelioUI2</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../../../../css/ntelioUI.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        .top-bar {
            flex-shrink: 0;
            padding: 10px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        .top-bar h5 { margin: 0 0 6px 0; }
        .layout-wrapper {
            flex: 1 1 auto;
            display: flex;
            overflow: hidden;
        }
        .event-log {
            flex-shrink: 0;
            height: 120px;
            border-top: 1px solid #dee2e6;
            padding: 6px 12px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #fafafa;
        }
        .event-log .log-entry { padding: 1px 0; color: #555; }
        .event-log .log-entry .badge { font-size: 0.7em; }

        /* Sample content styling */
        .file-list { list-style: none; padding: 0; margin: 0; }
        .file-list li {
            padding: 6px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85em;
            cursor: pointer;
        }
        .file-list li:hover { background: #f0f8ff; }
        .file-list li i { width: 18px; margin-right: 6px; color: #6c757d; }
        .props-table { font-size: 0.82em; }
        .props-table th { width: 100px; font-weight: 600; }
        .center-content { padding: 24px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1" style="font-size: 0.85em;">
                <li class="breadcrumb-item"><a href="../../../index.html">Examples</a></li>
                <li class="breadcrumb-item active">CollapsiblePane</li>
            </ol>
        </nav>
        <h5>CollapsiblePane — Multi-Pane Layout</h5>
        <div class="d-flex gap-2 flex-wrap">
            <button id="btn-toggle-left" class="btn btn-outline-primary btn-sm">Toggle Left</button>
            <button id="btn-toggle-right" class="btn btn-outline-primary btn-sm">Toggle Right</button>
            <button id="btn-collapse-all" class="btn btn-outline-secondary btn-sm">Collapse All</button>
            <button id="btn-expand-all" class="btn btn-outline-secondary btn-sm">Expand All</button>
            <button id="btn-clear-log" class="btn btn-outline-dark btn-sm ms-auto">Clear Log</button>
        </div>
    </div>

    <div id="layout" class="layout-wrapper"></div>

    <div id="event-log" class="event-log">
        <div class="log-entry text-muted">Event log — collapse, expand, and resize events appear here.</div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
