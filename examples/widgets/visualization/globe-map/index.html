<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobeMap - ntelioUI2</title>

    <!-- Dependencies - jQuery MUST be loaded before ES modules -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- ntelioUI2 styles -->
    <link href="../../../../css/ntelioUI.css" rel="stylesheet">

    <style>
        #globe-container {
            width: 100%;
            height: 70vh;
            min-height: 400px;
        }
        #info-panel {
            font-size: 0.875rem;
        }
        #info-panel .badge {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../../index.html">Examples</a></li>
                <li class="breadcrumb-item"><a href="#">Visualization</a></li>
                <li class="breadcrumb-item active">GlobeMap</li>
            </ol>
        </nav>

        <h1>GlobeMap</h1>
        <p class="lead">Interactive 3D globe with city markers. Click a point to fly to it. Scroll to zoom. Drag to rotate.</p>
        <hr>

        <div class="row">
            <div class="col-md-9">
                <div id="globe-container"></div>
            </div>
            <div class="col-md-3" id="info-panel">
                <h5>Skin</h5>
                <div class="btn-group mb-3 w-100" role="group">
                    <a href="?skin=satellite" class="btn btn-sm btn-outline-secondary" id="btn-skin-satellite">Satellite</a>
                    <a href="?skin=political" class="btn btn-sm btn-outline-secondary" id="btn-skin-political">Political</a>
                </div>

                <h5>Navigate</h5>
                <div class="mb-3">
                    <button id="btn-fly-beirut" class="btn btn-sm btn-outline-primary me-1 mb-1">Beirut</button>
                    <button id="btn-fly-tokyo" class="btn btn-sm btn-outline-primary me-1 mb-1">Tokyo</button>
                    <button id="btn-fly-nyc" class="btn btn-sm btn-outline-primary me-1 mb-1">New York</button>
                    <button id="btn-fly-london" class="btn btn-sm btn-outline-primary me-1 mb-1">London</button>
                    <button id="btn-reset" class="btn btn-sm btn-outline-secondary mb-1">Reset view</button>
                </div>

                <h5>Visible Points <span id="visible-count" class="badge bg-secondary">0</span></h5>
                <div id="visible-list" class="list-group list-group-flush" style="max-height: 300px; overflow-y: auto;"></div>

                <h5 class="mt-3">Events</h5>
                <div id="event-log" class="bg-light p-2 rounded small" style="max-height: 200px; overflow-y: auto; font-family: monospace;"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
